version: "3.8"

services:
  ml-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: z2data-ml-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
