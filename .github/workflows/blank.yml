name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train Project 1 - Supplier Risk
        run: python project1_supplier_risk/supplier_risk_model.py

      - name: Train Project 2 - Obsolescence
        run: python project2_component_obsolescence/obsolescence_model.py

      - name: Train Project 3 - Demand Forecasting
        run: python project3_demand_forecasting/demand_forecast_model.py

      - name: Verify model files exist
        run: |
          test -f project1_supplier_risk/models/gradient_boosting_tuned.joblib
          test -f project1_supplier_risk/models/scaler.joblib
          test -f project1_supplier_risk/models/imputer.joblib
          test -f project2_component_obsolescence/models/best_model.joblib
          test -f project2_component_obsolescence/models/scaler.joblib
          test -f project2_component_obsolescence/models/imputer.joblib
          test -f project3_demand_forecasting/models/best_forecasting_model.joblib
          echo "All model files generated successfully!"

      - name: Test API starts and loads models
        run: |
          cd deployment
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/
          kill %1
